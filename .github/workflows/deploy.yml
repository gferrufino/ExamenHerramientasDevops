name: Deploy Tienda Perritos to Amazon EKS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar credenciales de AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    - name: Actualizar el archivo Kubeconfig para conectar con el Cluster
      run: |
        aws eks update-kubeconfig --name ClusterTiendaPerritos --region us-east-1

    - name: Desplegar archivos YAML en Kubernetes
      run: |
        kubectl apply -f k8s-deployment.yaml