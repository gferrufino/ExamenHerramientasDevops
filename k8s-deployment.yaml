# ==========================================
# 1. BASE DE DATOS (MySQL Examen)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
      - name: db
        image: 825473902483.dkr.ecr.us-east-1.amazonaws.com/tiendaperritosmysqlexamen:latest # <-- ¡Corregido con tu ECR real!
        ports:
        - containerPort: 3306 # Puerto por defecto de MySQL
        env:
        - name: MYSQL_DATABASE
          value: tienda_perritos
        - name: MYSQL_USER
          value: usuario_perritos
        - name: MYSQL_PASSWORD
          value: password_seguro_123
        - name: MYSQL_ROOT_PASSWORD
          value: root_password_seguro_999
---
apiVersion: v1
kind: Service
metadata:
  name: db # Este nombre sirve de "HOST" para que el backend lo encuentre
spec:
  ports:
  - port: 3306 # Puerto de comunicación para MySQL
  selector:
    app: db

---
# ==========================================
# 2. BACKEND (Node.js)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: 825473902483.dkr.ecr.us-east-1.amazonaws.com/tiendaperritosbackendexamen:latest
        ports:
        - containerPort: 3001 
        env:
        - name: DATABASE_HOST
          value: "db" 
        - name: DATABASE_USER
          value: "usuario_perritos"
        - name: DATABASE_PASSWORD
          value: "password_seguro_123"
        - name: DATABASE_NAME
          value: "tienda_perritos"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  ports:
  - port: 3001
  selector:
    app: backend

---
# ==========================================
# 3. FRONTEND (Nginx / HTML)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: 825473902483.dkr.ecr.us-east-1.amazonaws.com/tiendaperritosfrontendexamen:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-servicio-publico
spec:
  type: LoadBalancer 
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: frontend